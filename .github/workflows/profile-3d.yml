name: GitHub-Profile-3D-Contrib

on:
  schedule: # Roda automaticamente todos os dias à meia-noite UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite que você clique num botão para rodar manualmente sempre que quiser

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A .
          git diff --staged --quiet || git commit -m "chore: update github profile 3d contrib"
          git push
